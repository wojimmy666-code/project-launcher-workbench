<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f6f8">
  <title>本地项目执行管理台</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><img src="/logo.svg" alt="" aria-hidden="true"></div>
        <div>
          <strong>项目管理台</strong>
          <span>Local Workbench</span>
        </div>
      </div>

      <div class="sidebar-section-head">
        <span>&#20998;&#31867;</span>
        <button id="manageCategoriesButton" class="sidebar-tool-button" type="button">&#31649;&#29702;</button>
      </div>
      <nav id="categoryNav" class="category-nav" aria-label="项目分类"></nav>
      <div class="sidebar-runtime" aria-label="本地运行信息">
        <span class="runtime-indicator" aria-hidden="true"></span>
        <div>
          <strong>本地工作台</strong>
          <span>Chrome 应用窗口</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>本地项目执行管理台</h1>
          <p id="summaryText">读取配置中...</p>
        </div>
        <div class="topbar-side">
          <div id="systemHealth" class="system-health" aria-label="系统状态"></div>
          <div class="toolbar-actions">
            <button id="newProjectButton" class="button primary" type="button">&#26032;&#22686;&#39033;&#30446;</button>
          </div>
        </div>
      </header>

      <section class="filters command-bar" aria-label="筛选工具">
        <label class="search-box">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="项目名、路径、标签">
        </label>
        <label>
          <span>状态</span>
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="running">运行中</option>
            <option value="starting">启动中</option>
            <option value="stopped">未启动</option>
            <option value="error">异常</option>
            <option value="unknown">未知</option>
          </select>
        </label>
        <label>
          <span>类型</span>
          <select id="typeFilter">
            <option value="all">全部类型</option>
          </select>
        </label>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>项目名称</th>
              <th>状态</th>
              <th>&#36164;&#28304;</th>
              <th>路径/命令</th>
              <th>&#32593;&#22336;</th>
              <th>&#24320;&#21457;</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="projectRows">
            <tr>
              <td colspan="7" class="empty-cell">读取配置中...</td>
            </tr>
          </tbody>
        </table>
      </section>
      <footer class="desktop-statusbar" aria-label="工作台状态">
        <div class="statusbar-group">
          <span id="footerServiceDot" class="statusbar-dot statusbar-checking" aria-hidden="true"></span>
          <span id="footerServiceState">本地服务检查中</span>
        </div>
        <div class="statusbar-group statusbar-summary">
          <div id="codexUsage" class="codex-usage codex-usage-loading" role="status" aria-live="polite">
            <span class="codex-usage-label">Codex &#21608;&#39069;&#24230;</span>
            <span class="codex-usage-meter" aria-hidden="true"><span id="codexUsageMeterFill"></span></span>
            <span id="codexUsageValue" class="codex-usage-value">--</span>
            <span id="codexUsageReset" class="codex-usage-reset">&#31561;&#24453;&#39069;&#24230;&#25968;&#25454;</span>
          </div>
          <span class="statusbar-separator" aria-hidden="true"></span>
          <span id="footerProjectCount">0 个可见项目</span>
          <span class="statusbar-separator" aria-hidden="true"></span>
          <span id="footerCheckedAt">等待状态检查</span>
        </div>
      </footer>
    </main>
  </div>

  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
  <aside id="projectDrawer" class="project-drawer" aria-hidden="true" inert>
    <form id="projectForm" class="project-form">
      <div class="drawer-head">
        <div>
          <h2 id="drawerTitle">&#26032;&#22686;&#39033;&#30446;</h2>
          <p>&#20445;&#23384;&#26102;&#20250;&#26657;&#39564;&#24182;&#22791;&#20221; projects.json</p>
        </div>
        <button id="drawerClose" class="icon-button" type="button" aria-label="&#20851;&#38381;">X</button>
      </div>

      <div id="drawerErrors" class="form-errors" hidden></div>

      <div id="drawerTabs" class="drawer-tabs" role="tablist" aria-label="&#39033;&#30446;&#35774;&#32622;&#20998;&#21306;">
        <button id="drawerTabBasic" class="drawer-tab active" type="button" role="tab" data-drawer-tab="basic" aria-controls="drawerPanelBasic" aria-selected="true">&#24120;&#29992;</button>
        <button id="drawerTabLinks" class="drawer-tab" type="button" role="tab" data-drawer-tab="links" aria-controls="drawerPanelLinks" aria-selected="false" tabindex="-1">&#20837;&#21475;</button>
        <button id="drawerTabLaunch" class="drawer-tab" type="button" role="tab" data-drawer-tab="launch" aria-controls="launchConfigSection" aria-selected="false" tabindex="-1">&#21551;&#21160;</button>
        <button id="drawerTabAdvanced" class="drawer-tab" type="button" role="tab" data-drawer-tab="advanced" aria-controls="drawerPanelAdvanced" aria-selected="false" tabindex="-1">&#39640;&#32423;</button>
      </div>

      <div class="drawer-body">
        <section id="drawerPanelBasic" class="drawer-tab-panel active" role="tabpanel" aria-labelledby="drawerTabBasic" data-drawer-panel="basic">
          <fieldset>
            <legend>&#24120;&#29992;&#20449;&#24687;</legend>
            <div class="form-grid two">
              <label class="field">
                <span>&#39033;&#30446; ID</span>
                <input name="id" required pattern="[a-zA-Z0-9_-]+" placeholder="exam-admin">
              </label>
              <label class="field">
                <span>&#39033;&#30446;&#21517;&#31216;</span>
                <input name="name" required placeholder="&#38376;&#24215;&#32771;&#35797;&#21518;&#21488;">
              </label>
              <label class="field">
                <span>&#31867;&#22411;</span>
                <select name="type" required></select>
              </label>
              <label class="field">
                <span>&#20998;&#31867;</span>
                <select name="category" required></select>
              </label>
            </div>
            <label class="field">
              <span>&#26631;&#31614;</span>
              <input name="tags" placeholder="Next.js, &#24120;&#29992;">
            </label>
            <div class="check-row">
              <label><input name="favorite" type="checkbox"> &#25910;&#34255;</label>
            </div>
          </fieldset>
        </section>

        <section id="drawerPanelLinks" class="drawer-tab-panel" role="tabpanel" aria-labelledby="drawerTabLinks" data-drawer-panel="links" hidden>
          <fieldset>
            <legend>&#24320;&#21457;&#20837;&#21475;</legend>
            <label class="field type-field" data-show="url,cmd,exe,bat">
              <span>&#39033;&#30446;&#32593;&#22336;</span>
              <input name="url" placeholder="http://localhost:3000">
              <span id="urlPortWarning" class="field-warning" role="status" aria-live="polite" hidden></span>
            </label>
            <label class="field">
              <span>GitHub &#22320;&#22336;</span>
              <div class="inline-field-action">
                <input name="githubUrl" placeholder="https://github.com/owner/repo">
                <a id="openGithubButton" class="button secondary link-button" target="_blank" rel="noopener noreferrer" hidden>&#25171;&#24320; GitHub</a>
              </div>
            </label>
            <label class="field">
              <span>Codex &#39033;&#30446;&#30446;&#24405;</span>
              <input name="codexCwd" placeholder="D:\Projects\example">
            </label>
          </fieldset>
        </section>

        <section id="launchConfigSection" class="drawer-tab-panel" role="tabpanel" aria-labelledby="drawerTabLaunch" data-drawer-panel="launch" hidden>
          <fieldset>
            <legend>&#21551;&#21160;&#37197;&#32622;</legend>
            <label class="field type-field" data-show="exe,bat,file,folder">
              <span>&#36335;&#24452;</span>
              <input name="path" placeholder="D:\Projects\example">
            </label>
            <label class="field type-field" data-show="exe,bat,cmd">
              <span>&#24037;&#20316;&#30446;&#24405;</span>
              <input name="cwd" placeholder="D:\Projects\example">
            </label>
            <label class="field type-field" data-show="cmd">
              <span>&#21551;&#21160;&#21629;&#20196;</span>
              <input name="command" placeholder="npm run dev">
            </label>
            <label class="field type-field" data-show="exe,bat">
              <span>&#21442;&#25968;&#65288;&#27599;&#34892;&#19968;&#20010;&#65289;</span>
              <textarea name="args" rows="3"></textarea>
            </label>
            <div class="check-row launch-checks">
              <label><input name="allowMultiple" type="checkbox"> &#20801;&#35768;&#22810;&#24320;</label>
              <label class="type-field" data-show="exe,bat,cmd"><input name="hideConsole" type="checkbox"> &#38544;&#34255;&#25511;&#21046;&#21488;&#31383;&#21475;</label>
              <label><input name="detectExternal" type="checkbox"> &#26816;&#27979;&#22806;&#37096;&#36827;&#31243;</label>
              <label><input name="allowStopExternal" type="checkbox"> &#20801;&#35768;&#20572;&#27490;&#22806;&#37096;&#36827;&#31243;</label>
              <label><input name="confirmBeforeStart" type="checkbox"> &#21551;&#21160;&#21069;&#30830;&#35748;</label>
            </div>
          </fieldset>
        </section>

        <section id="drawerPanelAdvanced" class="drawer-tab-panel" role="tabpanel" aria-labelledby="drawerTabAdvanced" data-drawer-panel="advanced" hidden>
          <fieldset>
            <legend>&#39640;&#32423;&#35774;&#32622;</legend>
            <div class="form-grid two">
              <label class="field">
                <span>&#31471;&#21475;</span>
                <input name="port" type="number" min="1" max="65535" placeholder="3000">
              </label>
              <label class="field">
                <span>&#26816;&#27979;&#20027;&#26426;</span>
                <input name="host" placeholder="127.0.0.1">
              </label>
            </div>
            <div class="field">
              <span>&#26085;&#24535;&#25991;&#20214;</span>
              <div class="inline-field-action">
                <input name="logFile" placeholder="logs\exam-admin.log">
                <button id="openDrawerLogButton" class="button secondary" type="button" hidden>&#25171;&#24320;&#26085;&#24535;</button>
              </div>
            </div>
          </fieldset>
        </section>
      </div>

      <div class="drawer-footer">
        <button id="deleteInDrawerButton" class="button danger" type="button" hidden>&#21024;&#38500;</button>
        <span class="footer-spacer"></span>
        <button id="drawerCancel" class="button secondary" type="button">&#21462;&#28040;</button>
        <button id="projectSaveButton" class="button primary" type="submit">&#20445;&#23384;</button>
      </div>
    </form>
  </aside>


  <dialog id="categoryModal" class="modal category-modal">
    <div class="modal-head">
      <h2>&#31649;&#29702;&#20998;&#31867;</h2>
      <button id="categoryModalClose" class="icon-button" type="button" aria-label="&#20851;&#38381;">X</button>
    </div>
    <div class="category-panel">
      <div id="categoryList" class="category-list"></div>
      <form id="categoryForm" class="category-form">
        <label class="field">
          <span>&#26032;&#20998;&#31867;</span>
          <input name="name" maxlength="40" required placeholder="&#20363;&#22914;&#65306;&#21069;&#31471;&#39029;&#38754;">
        </label>
        <button id="categoryCreateButton" class="button primary" type="submit">&#28155;&#21152;</button>
      </form>
    </div>
  </dialog>
  <dialog id="modal" class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">详情</h2>
      <button id="modalClose" class="icon-button" type="button" aria-label="关闭">X</button>
    </div>
    <pre id="modalBody"></pre>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
